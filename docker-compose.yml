version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: dev
    container_name: ferraco-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000
      - WHATSAPP_SESSIONS_PATH=/app/sessions
      - WAHA_URL=http://waha:3000
      - WAHA_API_KEY=1d27d04086bfadbf4f988f22b85889c4fbb92fd7e7d049aa09bb25ac223cd4b5
      - WAHA_SESSION_NAME=default
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - backend-data:/app/prisma
      - whatsapp-sessions:/app/sessions
      - whatsapp-tokens:/app/tokens
    networks:
      - ferraco-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  waha:
    image: devlikeapro/waha:latest
    container_name: ferraco-waha
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - WHATSAPP_HOOK_URL=http://backend:3000/webhooks/waha
      - WHATSAPP_HOOK_EVENTS=message,message.ack,session.status,state.change
      - WHATSAPP_SESSIONS_PATH=/app/.sessions
      - WAHA_API_KEY=1d27d04086bfadbf4f988f22b85889c4fbb92fd7e7d049aa09bb25ac223cd4b5
    volumes:
      - waha-sessions:/app/.sessions
    networks:
      - ferraco-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--header=X-Api-Key: 1d27d04086bfadbf4f988f22b85889c4fbb92fd7e7d049aa09bb25ac223cd4b5", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: ferraco-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    networks:
      - ferraco-network
    depends_on:
      - backend

networks:
  ferraco-network:
    driver: bridge

volumes:
  backend-data:
  whatsapp-sessions:
  whatsapp-tokens:
  waha-sessions:
