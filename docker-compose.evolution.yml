version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: ferraco-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Servidor
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080

      # Cors
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true

      # Autenticação com API Key Fixa
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=FERRACO2025
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # Database - Banco dedicado para Evolution API
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://ferraco:ferraco123@ferraco-postgres:5432/evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true

      # Cache/Redis - DESABILITADO (usando apenas PostgreSQL)
      - CACHE_REDIS_ENABLED=false
      - CACHE_REDIS_URI=
      - CACHE_LOCAL_ENABLED=false

      # Webhook
      - WEBHOOK_GLOBAL_URL=http://ferraco-crm-vps:3000/webhooks/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false

      # Eventos do Webhook
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONTACTS_SET=true
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=true
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=true
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_SET=true
      - WEBHOOK_EVENTS_CHATS_UPSERT=true
      - WEBHOOK_EVENTS_CHATS_UPDATE=true
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPDATE=false
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CALL=false
      - WEBHOOK_EVENTS_NEW_JWT_TOKEN=false

      # QR Code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754

      # Instância - Versão WhatsApp Web
      - CONFIG_SESSION_PHONE_CLIENT=Ferraco CRM
      - CONFIG_SESSION_PHONE_NAME=Chrome
      # VERSÃO ATUAL DO WHATSAPP WEB (atualizada via monitoramento automático)
      # Para atualizar manualmente: verificar em web.whatsapp.com > F12 > Console > window.Debug
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1028587753

      # Log
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - LOG_COLOR=true
      - LOG_BAILEYS=error

    volumes:
      - evolution-instances:/evolution/instances
      - evolution-store:/evolution/store

    networks:
      - ferraco-network

    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  evolution-instances:
  evolution-store:

networks:
  ferraco-network:
    external: true
    name: ferraco-network
