services:
  postgres:
    image: postgres:16-alpine
    container_name: ferraco-postgres
    environment:
      POSTGRES_USER: ferraco
      POSTGRES_PASSWORD: ferraco123
      POSTGRES_DB: ferraco_crm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ferraco-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferraco -d ferraco_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: ferraco-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Servidor
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080

      # Cors
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true

      # Autenticação com API Key (gerada automaticamente pelo backend)
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-}

      # Database - Usa PostgreSQL compartilhado
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://ferraco:ferraco123@postgres:5432/ferraco_crm
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true

      # Webhook
      - WEBHOOK_GLOBAL_URL=http://ferraco-crm-vps:3000/webhooks/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false

      # Eventos do Webhook
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONTACTS_SET=true
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=true
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=true
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_SET=true
      - WEBHOOK_EVENTS_CHATS_UPSERT=true
      - WEBHOOK_EVENTS_CHATS_UPDATE=true
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPDATE=false
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CALL=false
      - WEBHOOK_EVENTS_NEW_JWT_TOKEN=false

      # QR Code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754

      # Instância
      - CONFIG_SESSION_PHONE_CLIENT=Ferraco CRM
      - CONFIG_SESSION_PHONE_NAME=Chrome

      # Log
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - LOG_COLOR=true
      - LOG_BAILEYS=error

    volumes:
      - evolution-instances:/evolution/instances
      - evolution-store:/evolution/store
    networks:
      - ferraco-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ferraco-crm-vps:
    container_name: ferraco-crm-vps
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-0}
    image: ferraco-crm:latest
    ports:
      - "3050:3050"
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database (conecta ao container postgres)
      DATABASE_URL: postgresql://ferraco:ferraco123@postgres:5432/ferraco_crm

      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

      # Logs
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # API
      API_PREFIX: ${API_PREFIX:-/api}

      # WhatsApp / Evolution API
      WHATSAPP_SESSIONS_PATH: /app/sessions
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_INSTANCE_NAME: ferraco-crm
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      BACKEND_URL: http://ferraco-crm-vps:3000

    volumes:
      # Dados persistentes
      - ./data/ferraco-data:/app/data
      - ./data/ferraco-logs:/app/logs
      - ./data/ferraco-uploads:/app/uploads
      - ./data/ferraco-whatsapp-sessions:/app/sessions

    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - ferraco-network

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres-data:
  evolution-instances:
  evolution-store:

networks:
  ferraco-network:
    driver: bridge
